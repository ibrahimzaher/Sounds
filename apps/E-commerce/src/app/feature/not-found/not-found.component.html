<section
  class="relative min-h-[80vh] flex flex-col items-center justify-center px-6 py-24 overflow-hidden"
  aria-labelledby="not-found-heading"
>
  <!-- Decorative background blobs -->
  <div
    class="pointer-events-none absolute -top-32 -left-32 w-120 h-120 rounded-full bg-maroon-700/10 dark:bg-soft-pink-300/10 blur-3xl"
    aria-hidden="true"
  ></div>
  <div
    class="pointer-events-none absolute -bottom-32 -right-32 w-105 h-105 rounded-full bg-maroon-700/5 dark:bg-soft-pink-300/5 blur-3xl"
    aria-hidden="true"
  ></div>

  <!-- Main card -->
  <div
    class="relative z-10 flex flex-col items-center gap-6 text-center max-w-lg"
  >
    <!-- 404 number with icon overlay -->
    <div class="relative select-none" aria-hidden="true">
      <span
        class="block text-[clamp(7rem,20vw,12rem)] font-black leading-none tracking-tighter text-zinc-100 dark:text-zinc-800"
      >
        404
      </span>
      <!-- Icon badge -->
      <div class="absolute inset-0 flex items-center justify-center">
        <div
          class="flex items-center justify-center w-20 h-20 rounded-full bg-white/80 dark:bg-zinc-900/80 backdrop-blur-md border border-maroon-700/20 dark:border-soft-pink-300/20 shadow-xl shadow-maroon-700/10 dark:shadow-soft-pink-300/10 animate-bounce"
          style="animation-duration: 2.4s"
        >
          <lucide-icon
            name="compass"
            [size]="36"
            class="text-maroon-700 dark:text-soft-pink-300"
          />
        </div>
      </div>
    </div>

    <!-- Heading -->
    <h1
      id="not-found-heading"
      class="text-3xl sm:text-4xl font-bold tracking-tight text-zinc-800 dark:text-zinc-100"
    >
      {{ 'NOT_FOUND.TITLE' | translate }}
    </h1>

    <!-- Description -->
    <p
      class="text-base sm:text-lg text-zinc-500 dark:text-zinc-400 leading-relaxed"
    >
      {{ 'NOT_FOUND.DESCRIPTION' | translate }}
    </p>

    <!-- Divider decoration -->
    <div class="flex items-center gap-3 w-full max-w-xs" aria-hidden="true">
      <div
        class="h-px flex-1 bg-linear-to-r from-transparent to-maroon-700/30 dark:to-soft-pink-300/30"
      ></div>
      <lucide-icon
        name="zap"
        [size]="16"
        class="text-maroon-700/50 dark:text-soft-pink-300/50 shrink-0"
      />
      <div
        class="h-px flex-1 bg-linear-to-l from-transparent to-maroon-700/30 dark:to-soft-pink-300/30"
      ></div>
    </div>

    <!-- CTA buttons -->
    <div class="flex flex-wrap items-center justify-center gap-3">
      <lib-button
        routerLink="/home"
        size="lg"
        class="shadow-lg shadow-maroon-700/20 dark:shadow-soft-pink-300/10"
      >
        <lucide-icon name="house" [size]="16" class="mr-2" />
        {{ 'NOT_FOUND.BACK_TO_HOME' | translate }}
      </lib-button>

      <lib-button
        routerLink="/products"
        size="lg"
        variant="outline"
        class="shadow-lg shadow-maroon-700/20 dark:shadow-soft-pink-300/10"
      >
        <lucide-icon name="shopping-bag" [size]="16" class="mr-2" />
        {{ 'NOT_FOUND.BROWSE_PRODUCTS' | translate }}
      </lib-button>
    </div>
  </div>
</section>
