<div class="flex w-full flex-col gap-4 sm:gap-6">
  <div
    aria-live="polite"
    class="flex h-[19rem] w-full items-center justify-center overflow-hidden rounded-2xl bg-zinc-50 shadow dark:bg-zinc-900/40 sm:h-[24rem] lg:h-[25rem]">
    <img [src]="mainImage()" class="max-h-full max-w-full object-contain p-4 transition-all duration-500 sm:p-6"
      [alt]="product()?.title" />
  </div>

  <div class="custom-scrollbar flex items-center justify-start gap-2 overflow-x-auto pb-2 sm:justify-center sm:gap-3">
    <button type="button" (click)="changeImage(product()?.imgCover!)"
      [attr.aria-label]="'Show main image for ' + product()?.title"
      [attr.aria-pressed]="mainImage() === product()?.imgCover"
      class="h-16 w-16 shrink-0 cursor-pointer overflow-hidden rounded-lg border-2 p-0 transition-all sm:h-20 sm:w-20"
      [class.border-maroon-400]="mainImage() === product()?.imgCover"
      [class.border-transparent]="mainImage() !== product()?.imgCover">
      <img [src]="product()?.imgCover" class="w-full h-full object-cover" alt="" />
    </button>

    @for (img of product()?.images; track img) {
    <button type="button" (click)="changeImage(img)"
      [attr.aria-label]="'Show gallery image for ' + product()?.title"
      [attr.aria-pressed]="mainImage() === img"
      class="h-16 w-16 shrink-0 cursor-pointer overflow-hidden rounded-lg border-2 p-0 transition-transform hover:scale-105 sm:h-20 sm:w-20"
      [class.border-maroon-400]="mainImage() === img" [class.border-transparent]="mainImage() !== img">
      <img [src]="img" class="w-full h-full object-cover" alt="" />
    </button>
    }
  </div>
</div>
