<div class="space-y-6">
  <div class="text-center md:text-start">
    <h2 class="text-2xl font-bold text-gray-900 dark:text-white mb-2">
      {{ 'AUTH.OTP.TITLE' | translate }}
    </h2>
    <p class="text-gray-600 dark:text-gray-400">
      {{ 'AUTH.OTP.DESCRIPTION' | translate }}
      <span class="font-medium text-gray-900 dark:text-white" dir="ltr">{{
        email()
      }}</span>
      <button
        type="button"
        (click)="onEdit()"
        class="text-blue-600 hover:text-blue-700 font-medium ms-1 underline cursor-pointer"
      >
        {{ 'AUTH.OTP.EDIT' | translate }}
      </button>
    </p>
  </div>

  <div class="otp-input">
    <lib-otp-input [formControl]="otpControl" />
  </div>

  <div class="flex flex-col items-end gap-2">
    <div class="flex items-center gap-2 text-sm">
      @if (timer() > 0) {
      <span class="text-gray-500"
        >00:{{ timer() < 10 ? '0' + timer() : timer() }} </span
      >}

      <button
        type="button"
        (click)="resend()"
        [disabled]="timer() > 0 || isLoading()"
        [class.opacity-50]="timer() > 0 || isLoading()"
        class="text-primary-600 hover:text-primary-700 font-medium disabled:cursor-not-allowed cursor-pointer"
      >
        {{ 'AUTH.OTP.SEND_NEW' | translate }}
      </button>
    </div>
  </div>

  <lib-button
    (click)="verify()"
    [loading]="isLoading()"
    [block]="true"
    variant="primary"
  >
    {{ 'AUTH.OTP.VERIFY' | translate }}
  </lib-button>
</div>
