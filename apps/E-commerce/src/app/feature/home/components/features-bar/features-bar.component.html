<section>
  <div
    class="grid grid-cols-1 gap-4 rounded-2xl bg-maroon-50 px-5 py-6 sm:grid-cols-2 sm:gap-x-6 sm:gap-y-[1.15rem] sm:px-7 sm:py-7 xl:grid-cols-4 xl:gap-5 xl:px-8 xl:py-[1.8rem] dark:bg-none dark:bg-zinc-700"
  >
    @for (feature of features; track feature.title) {
    <article
      class="flex min-w-0 items-center gap-4 px-[0.45rem] py-[0.35rem] xl:px-1"
    >
      <div
        class="flex h-16 w-16 shrink-0 items-center justify-center rounded-full bg-maroon-600 text-white dark:bg-soft-pink-200 dark:text-zinc-700"
        aria-hidden="true"
      >
        <i [class]="feature.icon"></i>
      </div>

      <div class="min-w-0">
        <h3
          class="m-0 text-[1.05rem] font-bold leading-[1.15] text-maroon-600 dark:text-soft-pink-200"
        >
          {{ feature.title | translate }}
        </h3>
        <p
          class="mt-[0.3rem] text-[0.87rem] leading-[1.35] text-zinc-700 dark:text-zinc-100"
        >
          {{ feature.subtitle | translate }}
        </p>
      </div>
    </article>
    }
  </div>
</section>
