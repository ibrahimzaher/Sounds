<div class="relative flex items-center mb-2 w-full h-10">
  <div
    class="absolute top-1/2 start-0 w-full h-1 bg-zinc-200 dark:bg-zinc-700 -translate-y-1/2 rounded-full"
  ></div>

  <div
    class="absolute top-1/2 start-0 h-1 bg-maroon-700 -translate-y-1/2 transition-all duration-500 rounded-full"
    [style.width.%]="progressWidth()"
  ></div>

  @if (isTwoSteps()) {
    <div class="relative z-10 w-full h-full">
      @for (stepNumber of stepNumbers(); track stepNumber) {
        <div
          [class]="
            'absolute top-1/2 -translate-y-1/2 w-8 h-8 rounded-full flex items-center justify-center font-bold text-base shadow-sm transition-all duration-500 ' +
            (stepNumber <= currentStep() ? completedClass() : pendingClass())
          "
          [class.-translate-x-1/2]="stepNumber !== totalSteps()"
          [class.end-0]="stepNumber === totalSteps()"
          [style.left.%]="stepNumber !== totalSteps() ? 50 : null"
        >
          {{ stepNumber }}
        </div>
      }
    </div>
  } @else {
    <div class="relative z-10 flex w-full items-center justify-between">
      @for (stepNumber of stepNumbers(); track stepNumber) {
        <div
          [class]="
            'w-8 h-8 rounded-full flex items-center justify-center font-bold text-base shadow-sm transition-all duration-500 ' +
            (stepNumber <= currentStep() ? completedClass() : pendingClass())
          "
        >
          {{ stepNumber }}
        </div>
      }
    </div>
  }
</div>
