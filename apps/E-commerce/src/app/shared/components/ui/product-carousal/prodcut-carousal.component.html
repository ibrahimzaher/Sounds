<div class="relative w-full">
  @if (products().length > 0) { @if (isCarouselReady() && useCarousel()) {
  <p-carousel
    [value]="products()"
    [numVisible]="numVisible()"
    [numScroll]="numScroll()"
    [circular]="true"
    [responsiveOptions]="responsiveOptions()"
    [showIndicators]="false"
    [showNavigators]="showNavigators()"
    [prevButtonProps]="prevButtonProps"
    [nextButtonProps]="nextButtonProps"
  >
    <ng-template let-product pTemplate="item">
      <div class="mx-2 h-full py-4">
        <app-product-card [product]="product"></app-product-card>
      </div>
    </ng-template>
  </p-carousel>
  } @else {
  <div class="grid grid-cols-2 gap-4 py-4 md:grid-cols-3 xl:grid-cols-4">
    @for (product of products(); track product._id) {
    <div class="h-full">
      <app-product-card [product]="product"></app-product-card>
    </div>
    }
  </div>
  } } @else {
  <div class="flex items-center justify-center h-40 text-zinc-400">
    <p>{{ notFound() }}</p>
  </div>
  }
</div>
