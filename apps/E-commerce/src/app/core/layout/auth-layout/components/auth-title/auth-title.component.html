<div class="mb-4" [class.text-center]="style === 'default'" [class.text-start]="style === 'simple'">
    @if (style === 'default') {
    <h2
        class="font-edwardian text-3xl md:text-[48px] text-[#741C21] dark:text-[#FFA3B9] leading-tight max-w-xs md:max-w-none mx-auto">
        {{ title | translate }}
    </h2>
    } @else {
    @if (title) {
    <h2 class="text-2xl font-bold text-gray-900 dark:text-white mb-2">
        {{ title | translate }}
    </h2>
    }
    @if (description) {
    <p class="text-gray-600 dark:text-gray-400">
        {{ description | translate }}
    </p>
    }
    }
</div>
